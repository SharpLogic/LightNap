<p-breadcrumb data-cy="breadcrumb" class="max-w-full mb-2 block" [model]="breadcrumbItems()" [home]="homeItem">
  <ng-template #item let-menuItemAny>
    <div class="text-nowrap">
      @let menuItem = asMenuItem(menuItemAny);
      @if (menuItem.routerLink) {
        <a [routerLink]="menuItem.routerLink">
          @if (menuItem.icon) {
            <i [ngClass]="menuItem.icon" class="mr-2"></i>
          }
          {{ menuItem.label }}
        </a>
      } @else {
        @if (menuItem.icon) {
          <i [ngClass]="menuItem.icon" class="mr-2"></i>
        }
        <span>{{ menuItem.label }}</span>
      }
    </div>
  </ng-template>
  <ng-template #separator> / </ng-template>
</p-breadcrumb>
